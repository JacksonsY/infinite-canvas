<!doctype html>
<html lang="zh-CN" class="font-sans">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="一个无限画布创作工具" />
        <!-- 预连接默认 API 网关：应用加载后立即拉模型列表/发请求，提前完成 DNS+TLS 握手，降低首个 API 调用延迟 -->
        <link rel="preconnect" href="https://api.jzlh99.com" crossorigin />
        <link rel="dns-prefetch" href="https://api.jzlh99.com" />
        <link rel="icon" href="/logo.svg" />
        <title>无限画布</title>
        <script>
            try {
                var s = JSON.parse(localStorage.getItem("infinite-canvas:theme_store") || "{}");
                var t = s.state && s.state.theme === "light" ? "light" : "dark";
                document.documentElement.classList.toggle("dark", t === "dark");
                document.documentElement.style.colorScheme = t;
            } catch (e) {}
        </script>
    </head>
    <body class="bg-background text-foreground antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
